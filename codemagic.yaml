workflows:
  expo-ios:
    name: Soundmap iOS Sideload
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Fix permissions and install
        script: |
          find . -name ".bin" -type d -exec chmod -R +x {} +
          npm install
      - name: Expo Prebuild
        script: |
          # Vynútime názov SoundMap, aby sedel s Xcode
          npx expo prebuild --platform ios --no-install
      - name: Build IPA for Sideloadly
        script: |
          set -e
          # Používame presný názov SoundMap (veľké S a M)
          xcodebuild -workspace ios/SoundMap.xcworkspace \
            -scheme SoundMap \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            archive
          
          # Export do IPA
          mkdir -p $CM_BUILD_DIR/build
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist ios/SoundMap/Info.plist || echo "Export failed, check logs"
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa