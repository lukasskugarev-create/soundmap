workflows:
  expo-ios:
    name: Soundmap iOS Expo
    instance_type: mac_mini_m1
    max_build_duration: 60
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo Prebuild
        script: npx expo prebuild --platform ios
      - name: Build IPA
        script: | 
          # Toto vytvorí zostavu bez certifikátov, ktorú Sideloadly potrebuje
          mkdir -p build/ios
          xcodebuild -workspace ios/*.xcworkspace -scheme soundmap -configuration Release -sdk iphoneos -derivedDataPath build
    artifacts:
      - build/Build/Products/Release-iphoneos/*.ipa