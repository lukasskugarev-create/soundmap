workflows:
  expo-ios:
    name: Soundmap iOS Sideload
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Fix permissions and install
        script: |
          find . -name ".bin" -type d -exec chmod -R +x {} +
          npm install
      - name: Expo Prebuild
        script: |
          # Pridáme --clean, aby sa to skúsilo vytvoriť nanovo
          npx expo prebuild --platform ios --no-install
          # Pozrieme sa, či ten priečinok ios vôbec vznikol
          ls -d ios || echo "Priečinok ios NEEXISTUJE!"
      - name: Build IPA for Sideloadly
        script: |
          set -e
          # Ak prebuild neuspel, tu to padne s jasnou chybou
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            archive
          
          mkdir -p $CM_BUILD_DIR/build
          PLIST=$(find ios -name "Info.plist" | head -1)
          
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist "$PLIST" || echo "Export failed"
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa