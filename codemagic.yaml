workflows:
  expo-ios:
    name: Soundmap iOS Sideload
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Fix permissions and install
        script: |
          # Vymažeme binárky, ktoré robia problémy, nech si ich npm vytvorí nanovo
          rm -rf node_modules/.bin
          npm install
      - name: Force Expo Prebuild
        script: |
          set -e
          echo "Spúšťam Expo Prebuild cez npx..."
          # Použijeme npx expo priamo, čo by malo obísť permission denied
          npx expo prebuild --platform ios --no-install --non-interactive
          
          echo "Kontrola priečinka ios:"
          ls -la ios
      - name: Build IPA for Sideloadly
        script: |
          set -e
          WORKSPACE=$(ls ios/*.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_METHOD=manual
          
          mkdir -p $CM_BUILD_DIR/build
          
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>compileBitcode</key>
              <false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/SoundMap.xcarchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist ExportOptions.plist \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa