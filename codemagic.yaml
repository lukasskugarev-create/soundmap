workflows:
  expo-ios:
    name: Soundmap iOS Sideload
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Fix permissions and install
        script: |
          find . -name ".bin" -type d -exec chmod -R +x {} +
          npm install
      - name: Expo Prebuild
        script: |
          npx expo prebuild --platform ios
      - name: Build IPA for Sideloadly
        script: |
          set -e
          xcodebuild -workspace ios/*.xcworkspace \
            -scheme soundmap \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $CM_BUILD_DIR/Soundmap.xcarchive \
            archive
          
          xcodebuild -exportArchive \
            -archivePath $CM_BUILD_DIR/Soundmap.xcarchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist ios/soundmap/Info.plist || echo "Export failed"
    artifacts:
      - $CM_BUILD_DIR/build/*.ipa